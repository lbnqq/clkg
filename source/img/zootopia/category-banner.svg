<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10AC84;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1DD1A1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1920" height="400" fill="url(#catGrad)"/>

  <!-- 分类标签效果 -->
  <g>
    <rect x="300" y="100" width="200" height="60" rx="30" fill="#FF9F43" opacity="0.8"/>
    <text x="400" y="138" text-anchor="middle" font-size="20" fill="white">🏜️ Sahara</text>

    <rect x="550" y="100" width="200" height="60" rx="30" fill="#0ABDE3" opacity="0.8"/>
    <text x="650" y="138" text-anchor="middle" font-size="20" fill="white">❄️ Tundra</text>

    <rect x="800" y="100" width="200" height="60" rx="30" fill="#10AC84" opacity="0.8"/>
    <text x="900" y="138" text-anchor="middle" font-size="20" fill="white">🌴 Rainforest</text>

    <rect x="1050" y="100" width="200" height="60" rx="30" fill="#5F27CD" opacity="0.8"/>
    <text x="1150" y="138" text-anchor="middle" font-size="20" fill="white">🏙️ Downtown</text>

    <rect x="1300" y="100" width="200" height="60" rx="30" fill="#26DE81" opacity="0.8"/>
    <text x="1400" y="138" text-anchor="middle" font-size="20" fill="white">🥕 Bunnyburrow</text>
  </g>

  <text x="960" y="280" text-anchor="middle" font-size="48" fill="white" font-weight="bold" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
    📂 分类 CATEGORIES
  </text>
</svg>
