           L 50 120
           L 50 130
           L 60 130
           L 60 115
           L 75 115
           L 75 140
           M 80 140
           L 80 100
           L 95 100
           L 95 140
           M 100 140
           L 100 110
           L 115 110
           L 115 140
           M 120 140
           L 120 105
           L 135 105
           L 135 140
           M 140 140
           L 140 120
           L 155 120
           L 155 125
           L 165 125
           L 165 140"
        fill="none" stroke="#FFF" stroke-width="2" opacity="0.6"/>

  <!-- Z 文字 -->
  <text x="100" y="180" text-anchor="middle" fill="#FFF"
        font-size="20" font-weight="bold" font-family="Arial">ZOOTOPIA</text>
</svg>
