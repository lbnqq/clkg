/**
 * 疯狂动物城404优化页面
 * Zootopia 404 Page
 *
 * 友好的404错误页面，提供导航帮助
 */

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面迷路了 | 疯狂动物城</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                   'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .zt-404-container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 60px 40px;
      text-align: center;
      max-width: 600px;
      animation: zt-fade-in-up 0.6s ease-out;
    }

    @keyframes zt-fade-in-up {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .zt-404-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: zt-bounce 2s ease-in-out infinite;
    }

    @keyframes zt-bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-20px);
      }
      60% {
        transform: translateY(-10px);
      }
    }

    .zt-404-title {
      font-size: 48px;
      font-weight: bold;
      color: #2D3436;
      margin-bottom: 16px;
    }

    .zt-404-subtitle {
      font-size: 18px;
      color: #636E72;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .zt-404-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .zt-404-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #FF9F43 0%, #EE8A2D 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .zt-404-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 159, 67, 0.3);
    }

    .zt-404-link-secondary {
      background: linear-gradient(135deg, #0ABDE3 0%, #0097B5 100%);
    }

    .zt-404-link-secondary:hover {
      box-shadow: 0 8px 16px rgba(10, 189, 227, 0.3);
    }

    .zt-404-search {
      margin-top: 32px;
    }

    .zt-404-search input {
      width: 100%;
      max-width: 400px;
      padding: 14px 20px;
      border: 2px solid #E9ECEF;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .zt-404-search input:focus {
      outline: none;
      border-color: #FF9F43;
      box-shadow: 0 0 0 4px rgba(255, 159, 67, 0.1);
    }

    .zt-404-footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid #E9ECEF;
      font-size: 14px;
      color: #B2BEC3;
    }

    @media (max-width: 640px) {
      .zt-404-container {
        padding: 40px 24px;
      }

      .zt-404-title {
        font-size: 36px;
      }

      .zt-404-subtitle {
        font-size: 16px;
      }

      .zt-404-links {
        flex-direction: column;
      }

      .zt-404-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="zt-404-container">
    <div class="zt-404-icon">🦊</div>
    <h1 class="zt-404-title">404</h1>
    <p class="zt-404-subtitle">
      哎呀！朱迪警官找不到这个页面了。<br>
      可能是页面地址输入错误，或者该页面已被移除。
    </p>

    <div class="zt-404-links">
      <a href="/" class="zt-404-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        回到首页
      </a>
      <a href="/archives/" class="zt-404-link zt-404-link-secondary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
        </svg>
        文章归档
      </a>
    </div>

    <div class="zt-404-search">
      <input
        type="text"
        placeholder="搜索文章..."
        onkeypress="if(event.key==='Enter') window.location.href='/?q=' + this.value"
      >
    </div>

    <div class="zt-404-footer">
      疯狂动物城主题 v2.7.0
    </div>
  </div>

  <script>
    // 自动跳转到首页（可选，5秒后）
    // setTimeout(() => {
    //   window.location.href = '/';
    // }, 5000);
  </script>
</body>
</html>
