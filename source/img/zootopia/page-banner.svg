<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="pageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F43;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#0ABDE3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#10AC84;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#5F27CD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EE5A24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="1920" height="400" fill="url(#pageGradient)"/>

  <!-- 装饰性网格 -->
  <g stroke="white" stroke-width="1" opacity="0.1">
    <line x1="0" y1="100" x2="1920" y2="100"/>
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="300" x2="1920" y2="300"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1440" y1="0" x2="1440" y2="400"/>
  </g>

  <!-- 装饰性圆形 -->
  <circle cx="200" cy="100" r="150" fill="white" opacity="0.1"/>
  <circle cx="1720" cy="300" r="120" fill="white" opacity="0.1"/>
  <circle cx="960" cy="200" r="80" fill="white" opacity="0.15"/>

  <!-- 区域标识 -->
  <g font-size="60" opacity="0.2">
    <text x="150" y="200">🏜️</text>
    <text x="1770" y="200">❄️</text>
    <text x="400" y="250">🌴</text>
    <text x="1500" y="150">🏙️</text>
    <text x="920" y="320">🥕</text>
  </g>

  <!-- 标题背景框 -->
  <rect x="560" y="160" width="800" height="80" rx="10" fill="white" opacity="0.15"/>

  <!-- 标题文字占位 -->
  <text x="960" y="210" text-anchor="middle" font-size="32" fill="white" font-weight="bold" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">
    Your Title Here
  </text>
</svg>
