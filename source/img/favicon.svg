           L 40 20
           L 52 20
           L 52 35
           L 44 42
           L 44 54
           L 32 54
           L 20 54
           L 20 42
           L 12 35
           L 12 20
           L 24 20
           Z"
        fill="none" stroke="#FFF" stroke-width="2"/>

  <!-- Z 字母 -->
  <text x="32" y="38" text-anchor="middle" fill="#FFF"
        font-size="20" font-weight="bold" font-family="Arial">Z</text>

  <!-- 装饰星星 -->
  <polygon points="16,16 18,20 22,20 19,22 20,26 16,24 12,26 13,22 10,20 14,20"
           fill="#FFD700" opacity="0.8"/>
  <polygon points="48,16 50,20 54,20 51,22 52,26 48,24 44,26 45,22 42,20 46,20"
