<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 天空渐变 -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F43;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#EE5A24;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#5F27CD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ABDE3;stop-opacity:1" />
    </linearGradient>

    <!-- 城市渐变 -->
    <linearGradient id="cityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3436;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#636E72;stop-opacity:1" />
    </linearGradient>

    <!-- 窗户光晕 -->
    <filter id="windowGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 角色阴影 -->
    <filter id="characterShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 天空背景 -->
  <rect x="0" y="0" width="1920" height="600" fill="url(#skyGrad)"/>

  <!-- 装饰性太阳/月亮 -->
  <circle cx="1600" cy="120" r="80" fill="#FFEAA7" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1700" cy="100" r="60" fill="#FFEAA7" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- 云朵装饰 -->
  <g fill="white" opacity="0.3">
    <ellipse cx="300" cy="100" rx="80" ry="30">
      <animate attributeName="cx" values="300;350;300" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="350" cy="110" rx="60" ry="25">
      <animate attributeName="cx" values="350;400;350" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="400" cy="105" rx="70" ry="28">
      <animate attributeName="cx" values="400;450;400" dur="20s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g fill="white" opacity="0.2">
    <ellipse cx="1200" cy="80" rx="100" ry="35">
      <animate attributeName="cx" values="1200;1150;1200" dur="25s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1250" cy="90" rx="80" ry="30">
      <animate attributeName="cx" values="1250;1200;1250" dur="25s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- 装饰性圆形 -->
  <circle cx="200" cy="150" r="100" fill="#FF9F43" opacity="0.15">
    <animate attributeName="r" values="100;120;100" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1720" cy="200" r="120" fill="#0ABDE3" opacity="0.15">
    <animate attributeName="r" values="120;140;120" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="960" cy="80" r="80" fill="#10AC84" opacity="0.15">
    <animate attributeName="r" values="80;100;80" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- === 城市天际线 === -->

  <!-- 后景建筑层 -->
  <g fill="#2C3E50" opacity="0.7">
    <!-- Sahara区域建筑 -->
    <rect x="0" y="380" width="150" height="220"/>
    <polygon points="0,380 75,320 150,380"/>

    <!-- 金字塔 -->
    <polygon points="200,450 250,350 300,450" fill="#E17055" opacity="0.8"/>
    <polygon points="200,450 250,350 300,450" fill="none" stroke="#F39C12" stroke-width="2"/>
  </g>

  <!-- 中景建筑层 -->
  <g fill="#34495E">
    <!-- Tundratown区域 -->
    <rect x="350" y="350" width="120" height="250"/>
    <polygon points="350,350 410,280 470,350"/>
    <rect x="380" y="360" width="30" height="40" fill="#0ABDE3" opacity="0.5"/>
    <rect x="420" y="380" width="25" height="35" fill="#0ABDE3" opacity="0.5"/>

    <!-- 冰塔装饰 -->
    <polygon points="410,280 350,350 470,350" fill="#48DBFB" opacity="0.3"/>
  </g>

  <!-- 主建筑群 -->
  <g fill="url(#cityGrad)">
    <!-- Rainforest区域 - 热带风格 -->
    <rect x="500" y="380" width="100" height="220"/>
    <ellipse cx="550" cy="380" rx="60" ry="20" fill="#10AC84" opacity="0.4"/>
    <rect x="520" y="340" width="60" height="40" fill="#1DD1A1" opacity="0.6"/>

    <!-- Downtown高楼群 -->
    <rect x="620" y="280" width="180" height="320"/>
    <rect x="650" y="240" width="120" height="40"/>
    <rect x="680" y="200" width="60" height="40"/>
    <polygon points="620,280 710,180 800,280"/>

    <!-- 摩天楼尖顶 -->
    <polygon points="710,180 680,200 740,200" fill="#5F27CD"/>

    <!-- 更多建筑 -->
    <rect x="810" y="340" width="100" height="260"/>
    <polygon points="810,340 860,270 910,340"/>

    <rect x="920" y="300" width="120" height="300"/>
    <polygon points="920,300 980,220 1040,300"/>

    <rect x="1060" y="360" width="140" height="240"/>
    <polygon points="1060,360 1130,280 1200,360"/>
    <rect x="1100" y="250" width="60" height="110"/>

    <rect x="1210" y="320" width="110" height="280"/>
    <polygon points="1210,320 1265,240 1320,320"/>

    <rect x="1330" y="350" width="130" height="250"/>
    <polygon points="1330,350 1395,270 1460,350"/>

    <rect x="1470" y="380" width="120" height="220"/>
    <polygon points="1470,380 1530,300 1590,380"/>

    <rect x="1610" y="360" width="150" height="240"/>
    <polygon points="1610,360 1685,280 1760,360"/>
  </g>

  <!-- 窗户灯光 -->
  <g fill="#FFEAA7" filter="url(#windowGlow)">
    <!-- Downtown高楼窗户 -->
    <rect x="640" y="300" width="8" height="10"/>
    <rect x="660" y="300" width="8" height="10"/>
    <rect x="640" y="320" width="8" height="10"/>
    <rect x="700" y="300" width="8" height="10"/>
    <rect x="720" y="320" width="8" height="10"/>
    <rect x="700" y="340" width="8" height="10"/>

    <rect x="760" y="260" width="6" height="8"/>
    <rect x="780" y="260" width="6" height="8"/>
    <rect x="760" y="280" width="6" height="8"/>

    <!-- 更多建筑窗户 -->
    <rect x="840" y="370" width="10" height="12"/>
    <rect x="870" y="370" width="10" height="12"/>
    <rect x="840" y="400" width="10" height="12"/>

    <rect x="950" y="330" width="8" height="10"/>
    <rect x="980" y="330" width="8" height="10"/>
    <rect x="950" y="350" width="8" height="10"/>
    <rect x="990" y="360" width="8" height="10"/>

    <rect x="1090" y="390" width="12" height="14"/>
    <rect x="1130" y="390" width="12" height="14"/>
    <rect x="1170" y="400" width="12" height="14"/>

    <rect x="1240" y="350" width="10" height="12"/>
    <rect x="1270" y="350" width="10" height="12"/>
    <rect x="1240" y="380" width="10" height="12"/>

    <rect x="1360" y="380" width="11" height="13"/>
    <rect x="1400" y="380" width="11" height="13"/>
    <rect x="1380" y="410" width="11" height="13"/>

    <rect x="1500" y="400" width="9" height="11"/>
    <rect x="1530" y="400" width="9" height="11"/>
    <rect x="1560" y="420" width="9" height="11"/>

    <rect x="1640" y="390" width="10" height="12"/>
    <rect x="1680" y="390" width="10" height="12"/>
    <rect x="1720" y="400" width="10" height="12"/>
  </g>

  <!-- === 角色剪影 === -->

  <!-- Judy Hopps 剪影 -->
  <g transform="translate(100, 420)" filter="url(#characterShadow)">
    <ellipse cx="30" cy="25" rx="20" ry="22" fill="#95A5A6"/>
    <ellipse cx="30" cy="22" rx="18" ry="16" fill="#FFF"/>
    <!-- 兔耳 -->
    <ellipse cx="22" cy="5" rx="8" ry="20" fill="#95A5A6" transform="rotate(-20, 22, 5)"/>
    <ellipse cx="38" cy="5" rx="8" ry="20" fill="#95A5A6" transform="rotate(20, 38, 5)"/>
    <ellipse cx="22" cy="5" rx="5" ry="14" fill="#FFF" transform="rotate(-20, 22, 5)"/>
    <ellipse cx="38" cy="5" rx="5" ry="14" fill="#FFF" transform="rotate(20, 38, 5)"/>
    <!-- 身体 -->
    <rect x="15" y="45" width="30" height="40" rx="5" fill="#74B9FF"/>
    <!-- 警徽 -->
    <polygon points="30,65 20,65 25,55" fill="#F39C12"/>
  </g>

  <!-- Nick Wilde 剪影 -->
  <g transform="translate(180, 430)" filter="url(#characterShadow)">
    <ellipse cx="30" cy="20" rx="22" ry="20" fill="#E67E22"/>
    <ellipse cx="30" cy="18" rx="18" ry="15" fill="#FFF"/>
    <!-- 狐耳 -->
    <polygon points="10,5 20,-15 30,5" fill="#E67E22"/>
    <polygon points="30,5 40,-15 50,5" fill="#E67E22"/>
    <!-- 身体 -->
    <rect x="10" y="40" width="40" height="45" rx="5" fill="#3498DB"/>
    <!-- 领带 -->
    <rect x="25" y="40" width="10" height="25" fill="#27AE60"/>
  </g>

  <!-- === 火车系统 === -->

  <!-- 火车轨道 -->
  <g fill="none" stroke="#FFD700" stroke-width="4" stroke-dasharray="20,10" opacity="0.6">
    <path d="M 50,550 Q 500,520 960,540 T 1870,550">
      <animate attributeName="stroke-dashoffset" from="0" to="300" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 火车 -->
  <g transform="translate(400, 530)">
    <!-- 车头 -->
    <rect x="0" y="0" width="80" height="35" rx="5" fill="#EE5A24"/>
    <rect x="5" y="5" width="20" height="15" fill="#FFEAA7" opacity="0.8"/>
    <rect x="30" y="5" width="20" height="15" fill="#FFEAA7" opacity="0.8"/>
    <rect x="55" y="5" width="15" height="15" fill="#0ABDE3"/>
    <!-- 烟囱 -->
    <rect x="10" y="-15" width="8" height="15" fill="#2C3E50"/>
    <circle cx="14" cy="-18" r="6" fill="#BDC3C7" opacity="0.6">
      <animate attributeName="cy" values="-18;-25;-18" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- 车轮 -->
    <circle cx="15" cy="35" r="6" fill="#2C3E50"/>
    <circle cx="40" cy="35" r="6" fill="#2C3E50"/>
    <circle cx="65" cy="35" r="6" fill="#2C3E50"/>
    <!-- 移动动画 -->
    <animateTransform attributeName="transform" type="translate"
      values="400,530; 1500,530; 400,530" dur="20s" repeatCount="indefinite"/>
  </g>

  <!-- === 飞船/飞机 === -->
  <g transform="translate(1400, 150)">
    <ellipse cx="30" cy="15" rx="30" ry="10" fill="#FFF" opacity="0.8"/>
    <rect x="25" y="10" width="10" height="15" fill="#ECF0F1"/>
    <polygon points="5,15 0,10 0,20" fill="#BDC3C7"/>
    <animateTransform attributeName="transform" type="translate"
      values="1400,150; 100,200; 1400,150" dur="30s" repeatCount="indefinite"/>
  </g>

  <!-- === 装饰元素 === -->

  <!-- 地区标识牌 -->
  <g font-size="14" fill="white" opacity="0.6" font-weight="bold">
    <text x="250" y="580" text-anchor="middle">SAHARA</text>
    <text x="410" y="580" text-anchor="middle">TUNDRA</text>
    <text x="550" y="580" text-anchor="middle">RAINFOREST</text>
    <text x="750" y="580" text-anchor="middle">DOWNTOWN</text>
    <text x="1000" y="580" text-anchor="middle">CITY CENTER</text>
    <text x="1250" y="580" text-anchor="middle">PLAZA</text>
    <text x="1500" y="580" text-anchor="middle">MEADOWLANDS</text>
  </g>

  <!-- === 主标题区域 === -->

  <!-- 标题背景框 -->
  <rect x="460" y="180" width="1000" height="240" rx="20" fill="white" opacity="0.15"/>
  <rect x="470" y="190" width="980" height="220" rx="15" fill="white" opacity="0.1"/>

  <!-- 标题文字 -->
  <text x="960" y="280" text-anchor="middle" font-size="72" font-weight="bold" fill="white"
        font-family="Arial, sans-serif" style="text-shadow: 3px 3px 6px rgba(0,0,0,0.5);">
    ZOOTOPIA
  </text>

  <!-- 副标题 -->
  <text x="960" y="330" text-anchor="middle" font-size="28" fill="white"
        font-family="Arial, sans-serif" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
    疯狂动物城 | 在这里，任何人都可以成就任何事
  </text>

  <!-- 英文副标题 -->
  <text x="960" y="370" text-anchor="middle" font-size="18" fill="white" opacity="0.9"
        font-family="Arial, sans-serif" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">
    Try Everything! Anyone can be anything!
  </text>

  <!-- 装饰性爪印 -->
  <g font-size="24" opacity="0.4">
    <text x="500" y="400">🐾</text>
    <text x="700" y="390">🐾</text>
    <text x="1200" y="395">🐾</text>
    <text x="1400" y="405">🐾</text>
  </g>

  <!-- === 互动提示 === -->

  <g transform="translate(860, 420)">
    <rect x="0" y="0" width="200" height="50" rx="25" fill="rgba(255,255,255,0.2)"/>
    <text x="100" y="32" text-anchor="middle" font-size="16" fill="white" font-weight="bold">
      欢迎来到动物城 →
    </text>
  </g>

  <!-- === 底部装饰 === -->

  <!-- 彩虹条 -->
  <rect x="0" y="590" width="1920" height="10" fill="url(#skyGrad)" opacity="0.8"/>

</svg>
