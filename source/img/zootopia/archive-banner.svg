<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="archiveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5F27CD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#341F97;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1920" height="400" fill="url(#archiveGrad)"/>

  <!-- 文件柜效果 -->
  <g fill="none" stroke="white" stroke-width="2" opacity="0.3">
    <rect x="200" y="80" width="300" height="240" rx="5"/>
    <rect x="220" y="100" width="260" height="40"/>
    <rect x="220" y="160" width="260" height="40"/>
    <rect x="220" y="220" width="260" height="40"/>

    <rect x="1420" y="80" width="300" height="240" rx="5"/>
    <rect x="1440" y="100" width="260" height="40"/>
    <rect x="1440" y="160" width="260" height="40"/>
    <rect x="1440" y="220" width="260" height="40"/>
  </g>

  <!-- 时间线 -->
  <g stroke="#FFD700" stroke-width="4" opacity="0.5">
    <line x1="100" y1="200" x2="1820" y2="200"/>
    <circle cx="500" cy="200" r="15" fill="#FF9F43"/>
    <circle cx="800" cy="200" r="15" fill="#0ABDE3"/>
    <circle cx="1100" cy="200" r="15" fill="#10AC84"/>
    <circle cx="1400" cy="200" r="15" fill="#EE5A24"/>
  </g>

  <text x="960" y="220" text-anchor="middle" font-size="48" fill="white" font-weight="bold" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
    📚 归档 ARCHIVE
  </text>
</svg>
