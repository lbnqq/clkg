<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="stickerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#0D1B2A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 贴纸主体 -->
  <circle cx="60" cy="60" r="55" fill="url(#stickerGrad)" filter="url(#shadow)"/>

  <!-- 金色边框 -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#FFD700" stroke-width="2"/>

  <!-- ZPD 文字 -->
  <text x="60" y="45" text-anchor="middle" fill="#FFD700"
        font-size="14" font-weight="bold" font-family="Arial">ZPD</text>

  <!-- 徽章图案 -->
  <path d="M 40 55 Q 60 80 80 55 L 80 50 Q 60 75 40 50 Z"
        fill="#FFD700" stroke="#FFA500" stroke-width="1"/>

  <!-- 星星 -->
  <polygon points="60,25 62,32 69,32 63,36 65,43 60,39 55,43 57,36 51,32 58,32"
           fill="#FFD700"/>

  <!-- 兔子耳朵 -->
  <ellipse cx="50" cy="90" rx="5" ry="12" fill="#9C85C6"/>
  <ellipse cx="70" cy="90" rx="5" ry="12" fill="#9C85C6"/>

  <!-- 底部文字 -->
  <text x="60" y="110" text-anchor="middle" fill="#FFF"
        font-size="8" font-family="Arial">ZOOTOPIA POLICE</text>

  <!-- 内圈装饰 -->
  <circle cx="60" cy="60" r="45" fill="none" stroke="#FFD700"
          stroke-width="0.5" stroke-dasharray="3,2" opacity="0.5"/>
</svg>
