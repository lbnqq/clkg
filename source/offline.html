<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线模式 - 疯狂动物城</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .offline-container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .offline-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-20px);
      }
      60% {
        transform: translateY(-10px);
      }
    }

    .offline-title {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .offline-message {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .offline-tips {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .offline-tips h3 {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .offline-tips ul {
      list-style: none;
      text-align: left;
    }

    .offline-tips li {
      padding: 8px 0;
      color: #666;
      font-size: 14px;
      border-bottom: 1px dashed #ddd;
    }

    .offline-tips li:last-child {
      border-bottom: none;
    }

    .offline-tips li::before {
      content: '🦊';
      margin-right: 10px;
    }

    .retry-button {
      background: linear-gradient(135deg, #FF9F43 0%, #EE5A24 100%);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 15px 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .retry-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 159, 67, 0.3);
    }

    .retry-button:active {
      transform: translateY(0);
    }

    .offline-footer {
      margin-top: 30px;
      font-size: 12px;
      color: #999;
    }

    .offline-footer a {
      color: #666;
      text-decoration: none;
    }

    .offline-footer a:hover {
      color: #FF9F43;
    }

    /* 动画状态指示器 */
    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }

    .status-indicator.offline {
      background: #ff6b6b;
    }

    .status-indicator.checking {
      background: #ffd93d;
    }

    .status-indicator.online {
      background: #6bcf7f;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7);
      }
      70% {
        box-shadow: 0 0 0 10px rgba(255, 107, 107, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 107, 107, 0);
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">🦊</div>
    <h1 class="offline-title">
      <span class="status-indicator offline" id="statusIndicator"></span>
      离线模式
    </h1>
    <p class="offline-message">
      您当前处于离线状态。检查网络连接后，点击下方按钮重新加载。
    </p>

    <div class="offline-tips">
      <h3>💡 离线时您仍然可以</h3>
      <ul>
        <li>浏览已访问过的页面</li>
        <li>查看缓存的文章内容</li>
        <li>使用本地存储的功能</li>
        <li>玩离线游戏</li>
      </ul>
    </div>

    <button class="retry-button" id="retryButton">
      🔄 重新连接
    </button>

    <div class="offline-footer">
      <a href="/">返回首页</a> ·
      <a href="/archives">查看归档</a>
    </div>
  </div>

  <script>
    // 检查网络状态
    function checkNetworkStatus() {
      const indicator = document.getElementById('statusIndicator');

      if (navigator.onLine) {
        indicator.className = 'status-indicator online';
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      } else {
        indicator.className = 'status-indicator offline';
      }
    }

    // 监听网络状态变化
    window.addEventListener('online', () => {
      checkNetworkStatus();
    });

    // 重新连接按钮
    document.getElementById('retryButton').addEventListener('click', () => {
      const indicator = document.getElementById('statusIndicator');
      indicator.className = 'status-indicator checking';

      // 模拟检查
      setTimeout(() => {
        checkNetworkStatus();
      }, 1000);
    });

    // 初始检查
    checkNetworkStatus();

    // 定期检查网络状态
    setInterval(checkNetworkStatus, 5000);
  </script>
</body>
</html>
